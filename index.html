<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Master Pro - Sistema Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .aba-ativa { border-bottom: 3px solid #3b82f6; font-weight: bold; color: #1e40af; }
        .card-clicavel { cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .card-clicavel:active { transform: scale(0.96); background-color: #f3f4f6; }
        .modal-blur { backdrop-filter: blur(8px); }
        .dropdown-content { display: none; position: absolute; right: 0; top: 100%; z-index: 50; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div id="modal-detalhe-geral" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-8">
            <h3 id="detalhe-titulo" class="font-black text-gray-800 uppercase text-sm mb-4 text-blue-600"></h3>
            <div id="detalhe-conteudo" class="space-y-4 text-sm text-gray-600 max-h-[50vh] overflow-y-auto"></div>
            
            <div class="mt-6 space-y-2">
                <button onclick="document.getElementById('modal-detalhe-geral').classList.add('hidden')" class="w-full bg-gray-800 text-white font-black py-4 rounded-2xl active:scale-95 transition">FECHAR</button>
                <button id="btn-excluir-os" class="w-full bg-red-50 text-red-500 font-black py-3 rounded-2xl text-[10px] uppercase hover:bg-red-100 transition">Excluir Ordem de Serviço</button>
            </div>
        </div>
    </div>

    <div id="modal-os" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-lg rounded-[32px] shadow-2xl p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-gray-800 uppercase text-sm">Criar Ordem de Serviço</h3>
                <button onclick="fecharModalOS()" class="text-gray-300 text-xl">✕</button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="os-encanador" placeholder="Encanador" class="border-b py-2 outline-none text-sm focus:border-blue-500">
                    <input type="text" id="os-local" placeholder="Local" class="border-b py-2 outline-none text-sm focus:border-blue-500">
                </div>
                <input type="datetime-local" id="os-data" class="w-full border-b py-2 outline-none text-sm text-gray-400">
                <div class="border rounded-xl p-3 bg-gray-50">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Selecione os Materiais</p>
                    <div id="os-lista-materiais" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
                <button onclick="salvarOS()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">GERAR E DEBITAR</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto p-4">
        <header class="bg-white shadow-sm rounded-2xl p-5 mb-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-gray-800 tracking-tighter">ESTOQUE MASTER</h1>
                    <span class="text-[10px] text-blue-500 font-black">PAINEL DE CONTROLE</span>
                </div>
                
                <div class="relative dropdown">
                    <button class="bg-gray-100 p-3 rounded-xl text-gray-600 hover:bg-gray-200 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                        </svg>
                    </button>
                    <div class="dropdown-content pt-2 w-56">
                        <div class="bg-white border rounded-2xl shadow-2xl p-2 space-y-1">
                            <button onclick="criarCategoria()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📁 Nova Categoria</button>
                            <button onclick="criarItem()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase hover:bg-gray-50 rounded-xl">📦 Novo Produto</button>
                            <button onclick="adicionarQuantidadeEstoque()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-green-600 hover:bg-green-50 rounded-xl">➕ Entrada de Estoque</button>
                            <hr class="my-1">
                            <button onclick="abrirModalOS()" class="w-full text-left px-4 py-3 text-[10px] font-black uppercase text-blue-600 hover:bg-blue-50 rounded-xl">📝 Gerar O.S.</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="flex justify-around text-[10px] font-black text-gray-400 border-t pt-4 uppercase">
                <button id="btn-estoque" onclick="mudarAba('estoque')" class="aba-ativa">Estoque</button>
                <button id="btn-baixas" onclick="mudarAba('baixas')">Baixas</button>
                <button id="btn-relatorios" onclick="mudarAba('relatorios')">O.S.</button>
            </nav>
        </header>

        <section id="aba-estoque" class="aba">
            <div id="lista-estoque" class="space-y-4"></div>
        </section>

        <section id="aba-baixas" class="aba hidden">
            <div id="lista-baixas" class="space-y-3"></div>
        </section>

        <section id="aba-relatorios" class="aba hidden">
            <div id="historico-os" class="space-y-3"></div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://rkdpdfewahcrvmnuhptu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZHBkZmV3YWhjcnZtbnVocHR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQxNzQsImV4cCI6MjA5MTEzMDE3NH0.5hx8QhIEnEIQ8aZhXlvoOENg0MCBtSgFYh_4mTNCe4k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let todosOsItens = [];

        // --- ADMIN ---
        async function criarCategoria() {
            const nome = prompt("Nome da categoria:").toUpperCase();
            if(nome) { await _supabase.from('categorias').insert([{ nome }]); carregarEstoque(); }
        }

        async function criarItem() {
            const { data: cats } = await _supabase.from('categorias').select('*');
            const escolha = prompt("Selecione a Categoria:\n" + cats.map((c,i)=>`${i}) ${c.nome}`).join('\n'));
            const nome = prompt("Nome do produto:");
            if(nome && cats[escolha]) { 
                await _supabase.from('itens').insert([{ nome, categoria_id: cats[escolha].id, quantidade: 0 }]); 
                carregarEstoque(); 
            }
        }

        async function adicionarQuantidadeEstoque() {
            const { data: itens } = await _supabase.from('itens').select('*').order('nome');
            const escolha = prompt("Selecione o Produto:\n" + itens.map((it,i)=>`${i}) ${it.nome}`).join('\n'));
            const qtd = parseInt(prompt("Quantidade para adicionar:"));
            if(itens[escolha] && !isNaN(qtd)) {
                await _supabase.from('itens').update({ quantidade: itens[escolha].quantidade + qtd }).eq('id', itens[escolha].id);
                await _supabase.from('historico_movimentacao').insert([{ tipo: 'ENTRADA', quantidade: qtd, item_id: itens[escolha].id, observacao: 'Entrada via Admin' }]);
                carregarEstoque();
            }
        }

        // --- LÓGICA DE ORDEM DE SERVIÇO ---
        function abrirModalOS() {
            const lista = document.getElementById('os-lista-materiais');
            lista.innerHTML = todosOsItens.map(i => `
                <div class="flex justify-between items-center p-2 border-b text-xs">
                    <span>${i.nome}</span>
                    <input type="number" data-id="${i.id}" data-nome="${i.nome}" data-estoque="${i.quantidade}" class="os-item-qtd w-12 border rounded text-center py-1" value="0" min="0">
                </div>`).join('');
            document.getElementById('modal-os').classList.remove('hidden');
        }

        function fecharModalOS() { document.getElementById('modal-os').classList.add('hidden'); }

        async function salvarOS() {
            const enc = document.getElementById('os-encanador').value;
            const loc = document.getElementById('os-local').value;
            if(!enc || !loc) return alert("Por favor, preencha Encanador e Local.");

            const selecionados = [];
            document.querySelectorAll('.os-item-qtd').forEach(input => {
                const q = parseInt(input.value);
                if(q > 0) selecionados.push({ id: input.dataset.id, nome: input.dataset.nome, qtd: q, estoqueAntes: parseInt(input.dataset.estoque) });
            });

            if(selecionados.length === 0) return alert("Selecione ao menos um item.");

            for(const it of selecionados) {
                await _supabase.from('itens').update({ quantidade: it.estoqueAntes - it.qtd }).eq('id', it.id);
                await _supabase.from('historico_movimentacao').insert([{ tipo: 'SAIDA', quantidade: it.qtd, item_id: it.id, observacao: `O.S. Local: ${loc}` }]);
            }

            const hist = JSON.parse(localStorage.getItem('historico_os') || "[]");
            // Calcula o próximo número baseado no maior número já existente no histórico
            const maiorNum = hist.length > 0 ? Math.max(...hist.map(o => parseInt(o.numero))) : 0;
            const num = (maiorNum + 1).toString().padStart(3, '0');
            
            const novaOS = { id: Date.now(), numero: num, encanador: enc, local: loc, data: document.getElementById('os-data').value, itens: selecionados };
            
            hist.unshift(novaOS);
            localStorage.setItem('historico_os', JSON.stringify(hist));

            alert(`O.S. Nº${num} Gerada com Sucesso!`);
            fecharModalOS(); carregarEstoque(); renderizarHistoricoOS();
        }

        function renderizarHistoricoOS() {
            const h = JSON.parse(localStorage.getItem('historico_os') || "[]");
            document.getElementById('historico-os').innerHTML = h.map(os => `
                <div onclick='visualizarDetalheOS(${JSON.stringify(os)})' class="bg-white p-4 rounded-xl border flex justify-between items-center card-clicavel shadow-sm border-l-4 border-l-blue-500">
                    <div>
                        <p class="text-[10px] font-black text-blue-600 uppercase tracking-tighter">Nº${os.numero}</p>
                        <p class="font-bold text-xs uppercase text-gray-800">${os.local}</p>
                    </div>
                    <p class="text-[9px] font-bold text-gray-400 uppercase bg-gray-50 px-2 py-1 rounded-md">${os.encanador}</p>
                </div>`).join('') || '<p class="text-center text-[10px] text-gray-400 py-10">Nenhuma Ordem de Serviço lançada.</p>';
        }

        function visualizarDetalheOS(os) {
            document.getElementById('detalhe-titulo').innerText = `Ordem de Serviço Nº${os.numero}`;
            document.getElementById('detalhe-conteudo').innerHTML = `
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <p class="text-[10px] uppercase font-black text-blue-400">Local da Obra</p>
                    <p class="text-gray-800 font-bold">${os.local}</p>
                    <p class="text-[10px] uppercase font-black text-blue-400 mt-2">Responsável</p>
                    <p class="text-gray-800 font-bold">${os.encanador}</p>
                </div>
                <div class="pt-2">
                    <p class="text-[10px] font-black uppercase text-gray-400 mb-2">Materiais Utilizados:</p>
                    <div class="space-y-1">${os.itens.map(i => `<div class="flex justify-between py-1 border-b border-gray-100 italic"><span>${i.nome}</span><b>${i.qtd} un</b></div>`).join('')}</div>
                </div>
            `;
            
            // Configura o botão de excluir para esta OS específica
            document.getElementById('btn-excluir-os').onclick = () => excluirOS(os.id);
            document.getElementById('modal-detalhe-geral').classList.remove('hidden');
        }

        function excluirOS(id) {
            if(confirm("Deseja realmente excluir este registro de O.S.?\n(Isso não retornará os itens ao estoque automaticamente)")) {
                let hist = JSON.parse(localStorage.getItem('historico_os') || "[]");
                hist = hist.filter(os => os.id !== id);
                localStorage.setItem('historico_os', JSON.stringify(hist));
                document.getElementById('modal-detalhe-geral').classList.add('hidden');
                renderizarHistoricoOS();
            }
        }

        // --- SISTEMA CORE ---
        async function carregarEstoque() {
            const { data } = await _supabase.from('itens').select('*, categorias(nome)').order('nome');
            todosOsItens = data || [];
            const lista = document.getElementById('lista-estoque'), cats = {};
            todosOsItens.forEach(i => { const c = i.categorias?.nome || "GERAL"; if(!cats[c]) cats[c] = []; cats[c].push(i); });
            lista.innerHTML = Object.keys(cats).map(c => `
                <div class="bg-white rounded-xl border mb-4 shadow-sm overflow-hidden">
                    <div class="bg-gray-50 p-2 text-[8px] font-black text-gray-400 border-b uppercase tracking-widest">${c}</div>
                    ${cats[c].map(it => `<div class="p-4 flex justify-between border-b last:border-0"><span class="text-sm font-bold text-gray-700">${it.nome}</span><span class="text-blue-500 font-black">Qtd: ${it.quantidade}</span></div>`).join('')}
                </div>`).join('');
        }

        function mudarAba(aba) {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('aba-ativa'));
            document.getElementById(`aba-${aba}`).classList.remove('hidden');
            document.getElementById(`btn-${aba}`).classList.add('aba-ativa');
            if(aba === 'relatorios') renderizarHistoricoOS();
            if(aba === 'baixas') carregarBaixas();
        }

        async function carregarBaixas() {
            const { data } = await _supabase.from('historico_movimentacao').select('*, itens(nome)').eq('tipo', 'SAIDA').order('created_at', { ascending: false });
            document.getElementById('lista-baixas').innerHTML = data?.map(b => `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <div><p class="text-[10px] font-black text-blue-500">${new Date(b.created_at).toLocaleDateString()}</p><p class="font-bold text-xs uppercase">${b.itens?.nome}</p></div>
                    <p class="text-xs font-black text-red-500">-${b.quantidade}</p>
                </div>`).join('') || '<p class="text-center text-[10px] text-gray-400 py-10">Nenhuma baixa avulsa.</p>';
        }

        window.onload = () => carregarEstoque();
    </script>
</body>
</html>
