<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Master - Login & Gerenciamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .aba-ativa { border-bottom: 3px solid #3b82f6; font-weight: bold; color: #1e40af; }
        .esgotado { color: #ef4444; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #filtro-meses::-webkit-scrollbar { display: none; }
        #filtro-meses { -ms-overflow-style: none; scrollbar-width: none; }
        .forca-barra { height: 4px; transition: all 0.3s; width: 0%; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div id="tela-login" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8">
            <h2 id="login-titulo" class="text-2xl font-black text-center text-gray-800 mb-6">ENTRAR NO SISTEMA</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">E-mail ou Usuário</label>
                    <input type="text" id="auth-email" class="w-full border-b-2 border-gray-100 py-2 outline-none focus:border-blue-500 transition">
                </div>

                <div id="campo-nome-registro" class="hidden">
                    <label class="text-xs font-bold text-gray-400 uppercase">Nome Completo</label>
                    <input type="text" id="reg-nome" class="w-full border-b-2 border-gray-100 py-2 outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Senha</label>
                    <input type="password" id="auth-senha" oninput="validarForcaSenha(this.value)" class="w-full border-b-2 border-gray-100 py-2 outline-none focus:border-blue-500 transition">
                    
                    <div id="container-forca" class="hidden mt-2 bg-gray-100 w-full rounded-full overflow-hidden">
                        <div id="barra-forca" class="forca-barra bg-gray-300"></div>
                    </div>
                    <p id="msg-forca" class="hidden text-[10px] mt-1 font-bold uppercase"></p>
                </div>

                <button id="btn-principal" onclick="autenticar()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-700 transition mt-4">Entrar</button>
                
                <p class="text-center text-sm text-gray-500 mt-6">
                    <span id="texto-alternar">Não tem uma conta?</span> 
                    <button onclick="alternarModo()" class="text-blue-600 font-bold underline" id="btn-alternar">Cadastrar-se</button>
                </p>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto p-4 hidden">
        <header class="bg-white shadow-sm rounded-xl p-4 mb-6 sticky top-2 z-10">
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col">
                    <h1 class="text-xl font-black text-gray-800 tracking-tight">MEU ESTOQUE</h1>
                    <span id="user-display" class="text-[10px] text-blue-500 font-bold uppercase"></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="location.reload()" class="text-xs bg-red-50 text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-100 transition">Sair</button>
                </div>
            </div>
            <nav class="flex justify-around text-sm text-gray-500 border-t pt-3">
                <button id="btn-estoque" onclick="mudarAba('estoque')" class="pb-1 transition-all aba-ativa">Estoque</button>
                <button id="btn-relatorio" onclick="mudarAba('relatorio')" class="pb-1 transition-all">Relatório</button>
                <button id="btn-obs" onclick="mudarAba('obs')" class="pb-1 transition-all">Observações</button>
            </nav>
        </header>

        <section id="aba-estoque" class="aba">
            <div class="flex gap-2 mb-4">
                <button onclick="criarCategoria()" class="flex-1 text-xs bg-white border border-gray-200 py-2 rounded-lg font-bold">+ Categoria</button>
                <button onclick="criarItem()" class="flex-1 text-xs bg-blue-600 text-white py-2 rounded-lg font-bold">+ Item</button>
            </div>
            <div id="lista-estoque" class="space-y-3"></div>
        </section>
        
        <section id="aba-relatorio" class="aba hidden">
            <div class="bg-white p-5 rounded-xl shadow-sm">
                <div id="filtro-meses" class="flex gap-2 overflow-x-auto pb-4 mb-4 border-b"></div>
                <div id="tabela-relatorio" class="space-y-2 text-sm"></div>
            </div>
        </section>
        
        <section id="aba-obs" class="aba hidden"><div id="lista-obs" class="space-y-3"></div></section>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'https://rkdpdfewahcrvmnuhptu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZHBkZmV3YWhjcnZtbnVocHR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQxNzQsImV4cCI6MjA5MTEzMDE3NH0.5hx8QhIEnEIQ8aZhXlvoOENg0MCBtSgFYh_4mTNCe4k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let modoRegistro = false;
        let usuarioAtual = null;
        let senhaForte = false;

        // Alterna entre as telas de Login e Cadastro
        function alternarModo() {
            modoRegistro = !modoRegistro;
            document.getElementById('login-titulo').innerText = modoRegistro ? 'CRIAR CONTA' : 'ENTRAR NO SISTEMA';
            document.getElementById('campo-nome-registro').classList.toggle('hidden', !modoRegistro);
            document.getElementById('container-forca').classList.toggle('hidden', !modoRegistro);
            document.getElementById('msg-forca').classList.toggle('hidden', !modoRegistro);
            document.getElementById('btn-principal').innerText = modoRegistro ? 'Finalizar Cadastro' : 'Entrar';
            document.getElementById('texto-alternar').innerText = modoRegistro ? 'Já tem conta?' : 'Não tem uma conta?';
            document.getElementById('btn-alternar').innerText = modoRegistro ? 'Entrar agora' : 'Cadastrar-se';
            
            // Limpa campos ao trocar
            document.getElementById('auth-senha').value = "";
            validarForcaSenha("");
        }

        // Valida a força da senha e restrições de caracteres
        function validarForcaSenha(senha) {
            if (!modoRegistro) return;

            const barra = document.getElementById('barra-forca');
            const msg = document.getElementById('msg-forca');
            const btn = document.getElementById('btn-principal');
            
            // Regex: Apenas letras e números, sem espaços ou símbolos
            const regexInvalido = /[^a-zA-Z0-9]/;
            
            if (regexInvalido.test(senha)) {
                msg.innerText = "Erro: Use apenas letras e números";
                msg.className = "text-[10px] mt-1 font-bold uppercase text-red-500";
                barra.style.width = "100%";
                barra.className = "forca-barra bg-red-500";
                senhaForte = false;
                btn.classList.replace('bg-blue-600', 'bg-gray-400');
                return;
            }

            let forca = 0;
            if (senha.length >= 6) forca += 25;
            if (/[a-z]/.test(senha)) forca += 25;
            if (/[A-Z]/.test(senha)) forca += 25;
            if (/[0-9]/.test(senha)) forca += 25;

            barra.style.width = forca + "%";

            if (senha.length === 0) {
                msg.innerText = "";
                barra.className = "forca-barra bg-gray-300";
                senhaForte = false;
            } else if (forca < 50 || senha.length < 6) {
                msg.innerText = "Senha Curta ou Fraca";
                msg.className = "text-[10px] mt-1 font-bold uppercase text-red-500";
                barra.className = "forca-barra bg-red-500";
                senhaForte = false;
            } else if (forca < 100) {
                msg.innerText = "Senha Média";
                msg.className = "text-[10px] mt-1 font-bold uppercase text-yellow-500";
                barra.className = "forca-barra bg-yellow-500";
                senhaForte = false;
            } else {
                msg.innerText = "Senha Forte!";
                msg.className = "text-[10px] mt-1 font-bold uppercase text-green-500";
                barra.className = "forca-barra bg-green-500";
                senhaForte = true;
            }

            // Habilita o botão apenas se for forte e válida
            if (senhaForte) {
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
                btn.disabled = false;
            } else {
                btn.classList.replace('bg-blue-600', 'bg-gray-400');
                btn.disabled = true;
            }
        }

        async function autenticar() {
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const senha = document.getElementById('auth-senha').value.trim();

            if (modoRegistro) {
                if (!senhaForte) return alert("Crie uma senha forte (barra verde) para continuar.");
                const nome = document.getElementById('reg-nome').value.trim();
                
                const { error } = await _supabase.from('usuarios').insert([{ 
                    nome_usuario: nome, 
                    email: email, 
                    senha: senha 
                }]);

                if (error) alert("Erro ao cadastrar. Verifique os dados.");
                else {
                    alert("Cadastro realizado com sucesso!");
                    alternarModo();
                }
            } else {
                // LOGIN
                const { data, error } = await _supabase.from('usuarios')
                    .select('*').eq('email', email).eq('senha', senha).single();

                if (data) {
                    usuarioAtual = data;
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    // Exibição Especial Guilherme
                    document.getElementById('user-display').innerText = (data.nome_usuario === 'GuilhermeCardoso') ? 'TI ADMIN' : data.nome_usuario;
                    carregarEstoque();
                } else {
                    alert("Usuário ou senha incorretos.");
                }
            }
        }

        // Funções de Estoque (Simpificadas para o exemplo rodar)
        function mudarAba(aba) {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.getElementById(`aba-${aba}`).classList.remove('hidden');
            if(aba === 'estoque') carregarEstoque();
        }

        async function carregarEstoque() {
            const { data } = await _supabase.from('itens').select('*').order('nome');
            const lista = document.getElementById('lista-estoque');
            lista.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 ${item.quantidade <= 0 ? 'border-red-500' : 'border-blue-500'}">
                    <div>
                        <p class="font-bold text-gray-800">${item.nome}</p>
                        <p class="text-xs text-gray-400">Qtd: ${item.quantidade}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
